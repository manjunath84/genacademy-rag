{% extends "base.html" %}
{% block title %}GenAcademy Compass - Sign up{% endblock %}
{% block body %}
<main class="min-h-screen flex items-center justify-center px-4 py-10">
  <section class="w-full max-w-sm space-y-6">
    <div class="flex flex-col items-center space-y-2 text-center">
      <div class="flex h-12 w-12 items-center justify-center rounded-full border border-[var(--rule)] bg-white text-[var(--mineral-text)] font-mono font-bold text-xl shadow-sm mb-2">C</div>
      <p class="gc-eyebrow">GenAcademy Compass</p>
      <h1 class="gc-serif text-3xl font-bold tracking-tight text-[var(--ink)]">Create your Compass account</h1>
      <p class="pt-1 text-sm" style="color:var(--mute)">Evidence-first answers from the cohort materials.</p>
    </div>
    <form method="post" action="/signup" class="gc-card p-6 space-y-4">
      {% if error %}<p class="text-sm font-semibold" style="color:var(--warn)">{{ error }}</p>{% endif %}
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <label class="block text-sm font-semibold" style="color:var(--ink)">Email
        <input name="email" placeholder="email" class="gc-input mt-1 w-full px-4 py-2">
      </label>
      <label class="block text-sm font-semibold" style="color:var(--ink)">Password
        <input name="password" type="password" placeholder="password" class="gc-input mt-1 w-full px-4 py-2">
      </label>
      <label class="block text-sm font-semibold" style="color:var(--ink)">Invite code
        <input name="code" placeholder="invite code" class="gc-input mt-1 w-full px-4 py-2">
      </label>
      <button class="gc-btn-primary w-full py-2.5">Sign up</button>
      <p class="text-center text-sm" style="color:var(--mute)"><a class="gc-link" href="/login">Back to sign in</a></p>
    </form>
  </section>
</main>
{% endblock %}
