<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}GenAcademy Compass{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    /* GenAcademy house theme — cream paper + 40px grid + electric-yellow accent + dark-blue,
       system sans-serif, brutalist 2px-ink borders with hard offset shadows. Layout still uses
       Tailwind utilities; these component classes own the *skin* so template diffs stay small. */
    :root{
      --paper:#FDFCEF; --ink:#0F1419; --accent:#EAFF00; --dark:#1E3A5F;
      --grid:rgba(232,228,208,.5); --code-bg:#F5F2DA; --rule:#d9d4b8;
      --mute:#666; --mute2:#888; --warn:#C00;
    }
    html,body{min-height:100%}
    body{
      background-color:var(--paper);
      background-image:
        linear-gradient(var(--grid) 1px,transparent 1px),
        linear-gradient(90deg,var(--grid) 1px,transparent 1px);
      background-size:40px 40px;
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    }
    code,kbd,samp{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}

    /* Wordmark + headings */
    .gc-h1{font-weight:900;letter-spacing:-.02em;line-height:1.05}
    .gc-bar::after{content:"";display:block;width:84px;height:10px;margin-top:.24em;
      background:var(--accent);border:2px solid var(--ink)}
    .gc-eyebrow{font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--mute)}
    mark,.gc-hl{background:var(--accent);padding:0 .14em;color:var(--ink)}

    /* Cards */
    .gc-card{background:var(--paper);border:2px solid var(--ink);border-radius:8px;box-shadow:6px 6px 0 var(--ink)}
    .gc-card-soft{background:var(--paper);border:2px solid var(--ink);border-radius:8px;box-shadow:3px 3px 0 var(--ink)}

    /* Inputs */
    .gc-input{border:2px solid var(--ink);border-radius:6px;background:#fff;color:var(--ink)}
    .gc-input::placeholder{color:var(--mute2)}
    .gc-input:focus{outline:3px solid var(--accent);outline-offset:0}

    /* Buttons */
    .gc-btn{border:2px solid var(--ink);border-radius:6px;background:var(--paper);color:var(--ink);
      font-weight:700;box-shadow:4px 4px 0 var(--ink);transition:transform .04s,box-shadow .04s}
    .gc-btn:hover{background:var(--accent);transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}
    .gc-btn:active{transform:translate(4px,4px);box-shadow:0 0 0 var(--ink)}
    .gc-btn-primary{border:2px solid var(--ink);border-radius:6px;background:var(--ink);color:var(--accent);
      font-weight:800;box-shadow:4px 4px 0 var(--dark);transition:transform .04s,box-shadow .04s}
    .gc-btn-primary:hover{background:var(--dark);color:var(--accent);transform:translate(2px,2px);box-shadow:2px 2px 0 var(--dark)}
    .gc-btn-primary:disabled{opacity:.85;cursor:progress}

    /* Dark nav chip (ink fill, yellow text, mono) */
    .gc-chip{display:inline-flex;align-items:center;background:var(--ink);color:var(--accent);
      border:2px solid var(--ink);border-radius:6px;font-weight:700;
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace;box-shadow:3px 3px 0 rgba(15,20,25,.22)}
    .gc-chip:hover{background:var(--dark)}
    .gc-chip-current{background:var(--accent);color:var(--ink)}
    .gc-chip-ghost{color:var(--mute);text-decoration:underline;text-underline-offset:2px}
    .gc-chip-ghost:hover{color:var(--ink)}

    /* Suggestion pills */
    .gc-pill{border:2px solid var(--ink);border-radius:999px;background:var(--paper);color:var(--ink);
      font-weight:600;box-shadow:3px 3px 0 var(--ink);transition:transform .04s,box-shadow .04s}
    .gc-pill:hover{background:var(--accent);transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}

    /* Status badges — keep traffic-light semantics; brutalist frame */
    .gc-badge{display:inline-flex;align-items:center;gap:.4em;border:2px solid var(--ink);border-radius:999px;font-weight:800}
    .gc-badge-high{background:#D8F3DC;color:#14532d}
    .gc-badge-mid{background:#FFF3BF;color:#7c5e10}
    .gc-badge-low{background:#E9ECEF;color:#343a40}
    .gc-badge-refuse{background:var(--code-bg);border-color:var(--warn);color:var(--warn)}

    /* Evidence cards */
    .gc-source{border:2px solid var(--ink);border-radius:6px;background:#fff;box-shadow:3px 3px 0 var(--ink)}
    .gc-source>summary{cursor:pointer;list-style:none}
    .gc-source>summary::-webkit-details-marker{display:none}
    .gc-link{color:var(--dark);font-weight:700;text-decoration:underline;text-decoration-color:var(--accent);
      text-decoration-thickness:3px;text-underline-offset:2px}
    .gc-snippet{background:var(--code-bg);border-left:8px solid var(--accent);
      font-family:ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap}
    .gc-rule{border-top:2px dashed var(--rule)}

    /* Trust sidebar */
    .gc-trust{border-left:10px solid var(--accent)}
    .gc-tick{position:relative;padding-left:20px}
    .gc-tick::before{content:"";position:absolute;left:0;top:.45em;width:9px;height:9px;
      background:var(--accent);border:2px solid var(--ink)}
    .gc-mm{border:2px solid var(--ink);border-radius:6px;background:#fff;box-shadow:3px 3px 0 var(--ink)}

    /* Brutalist tables (admin) */
    .gc-table thead{background:var(--ink)}
    .gc-table thead th{color:var(--accent);letter-spacing:.06em}
    .gc-table tbody tr{border-top:2px solid var(--ink)}

    /* Loading spinner for the Ask button */
    @keyframes gc-spin{to{transform:rotate(360deg)}}
    .gc-spin{display:inline-block;width:14px;height:14px;border:2px solid var(--accent);
      border-top-color:transparent;border-radius:999px;animation:gc-spin .6s linear infinite}

    [x-cloak]{display:none}
  </style>
</head>
<body class="min-h-screen antialiased">
  {% block body %}{% endblock %}
</body>
</html>
