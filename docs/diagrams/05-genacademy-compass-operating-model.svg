<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2150" viewBox="0 0 1800 2150" role="img" aria-labelledby="title desc">
  <title id="title">GenAcademy Compass Operating Model Infographic</title>
  <desc id="desc">A five-chapter infographic summarizing the GenAcademy Compass user experience and GenAcademy RAG architecture: the query spine ending in a cited answer or honest refusal, the two-tier corpus policy, eval results and default-off experiments, config seams and Hugging Face Space deployment, and the guardrails and scale posture.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.46" stop-color="#f4f6f8"/>
      <stop offset="1" stop-color="#e7ebf0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf1f5"/>
    </linearGradient>
    <linearGradient id="cardDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 H 0 V 44" fill="none" stroke="#cbd5e1" stroke-width="1" opacity="0.23"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-12%" width="120%" height="128%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#111827" flood-opacity="0.13"/>
    </filter>
    <marker id="arrowLight" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 2 L 12 7 L 2 12 Z" fill="#cbd5e1"/>
    </marker>
    <marker id="arrowRose" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 2 L 12 7 L 2 12 Z" fill="#be123c"/>
    </marker>
    <style>
      .font { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .kicker { font-size: 14px; font-weight: 850; fill: #64748b; letter-spacing: 2.1px; text-transform: uppercase; }
      .title { font-size: 52px; font-weight: 920; fill: #0f172a; }
      .subtitle { font-size: 21px; font-weight: 600; fill: #334155; }
      .q { font-size: 14px; font-weight: 850; fill: #64748b; letter-spacing: 1.6px; text-transform: uppercase; }
      .qDark { font-size: 14px; font-weight: 850; fill: #94a3b8; letter-spacing: 1.6px; text-transform: uppercase; }
      .headline { font-size: 26px; font-weight: 880; fill: #111827; }
      .headlineDark { font-size: 26px; font-weight: 880; fill: #ffffff; }
      .body { font-size: 16px; font-weight: 560; fill: #334155; }
      .bodyStrong { font-size: 16px; font-weight: 800; fill: #0f172a; }
      .bodyDark { font-size: 16px; font-weight: 560; fill: #dbe4ee; }
      .small { font-size: 13px; font-weight: 700; fill: #64748b; }
      .smallDark { font-size: 13px; font-weight: 700; fill: #94a3b8; }
      .label { font-size: 12px; font-weight: 850; fill: #64748b; letter-spacing: 1px; text-transform: uppercase; }
      .num { font-size: 19px; font-weight: 900; fill: #111827; }
      .numDark { font-size: 19px; font-weight: 900; fill: #ffffff; }
      .metric { font-size: 32px; font-weight: 930; fill: #0f172a; }
      .metricSmall { font-size: 19px; font-weight: 880; fill: #0f172a; }
      .chipDark { font-size: 12px; font-weight: 800; fill: #e2e8f0; letter-spacing: 0.4px; }
      .pill { font-size: 12px; font-weight: 850; fill: #475569; letter-spacing: 0.6px; text-transform: uppercase; }
      .card { fill: url(#card); stroke: #94a3b8; stroke-width: 2; filter: url(#shadow); }
      .plain { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .lane { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .dark { fill: url(#cardDark); stroke: #334155; stroke-width: 2; filter: url(#shadow); }
      .line { fill: none; stroke: #cbd5e1; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowLight); }
      .branch { fill: none; stroke: #fda4af; stroke-width: 3; stroke-dasharray: 2 8; stroke-linecap: round; marker-end: url(#arrowRose); }
      .blocked { fill: none; stroke: #be123c; stroke-width: 3; stroke-dasharray: 8 8; stroke-linecap: round; marker-end: url(#arrowRose); }
      .up { fill: #047857; }
      .down { fill: #be123c; }
    </style>
  </defs>

  <rect width="1800" height="2150" fill="url(#page)"/>
  <rect width="1800" height="2150" fill="url(#grid)" opacity="0.8"/>
  <path d="M 0 0 H 1800 V 224 C 1400 144 1048 248 690 170 C 430 114 214 130 0 192 Z" fill="#e2e8f0" opacity="0.82"/>
  <path d="M 0 1948 C 356 1868 700 1978 1010 1906 C 1294 1840 1548 1824 1800 1908 V 2150 H 0 Z" fill="#dfe5ec" opacity="0.72"/>

  <!-- ============ Header ============ -->
  <g class="font">
    <text x="72" y="72" class="kicker">GenAcademy Compass · operating model</text>
    <text x="72" y="138" class="title">Evidence-First Course Compass</text>
    <text x="74" y="180" class="subtitle">Ask a course question, get a cited answer or an honest refusal — and measure every retrieval change before trusting it.</text>
  </g>
  <g class="font" transform="translate(1280 50)" filter="url(#shadow)">
    <path d="M 0 0 H 400 L 450 50 L 400 100 H 0 L 40 50 Z" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
    <text x="64" y="38" class="label">Phase 2 posture</text>
    <text x="64" y="72" class="metricSmall">Preset swaps shipped</text>
  </g>

  <!-- ============ Chapter 1: query spine (hero) ============ -->
  <g class="font" transform="translate(70 230)">
    <rect class="dark" width="1660" height="480" rx="26"/>
    <circle cx="46" cy="54" r="23" fill="#334155" stroke="#64748b"/>
    <text x="46" y="61" text-anchor="middle" class="numDark">1</text>
    <text x="88" y="46" class="qDark">What happens to a question?</text>
    <text x="88" y="88" class="headlineDark">Every answer is cited — or it is an honest refusal</text>

    <g transform="translate(42 132)">
      <rect x="0" y="0" width="240" height="126" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="120" y="34" text-anchor="middle" class="label">Ask</text>
      <text x="120" y="66" text-anchor="middle" class="metricSmall">Course question</text>
      <text x="120" y="96" text-anchor="middle" class="small">session + CSRF</text>
      <path class="line" d="M 248 63 H 288"/>

      <rect x="296" y="0" width="250" height="126" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="421" y="34" text-anchor="middle" class="label">Retrieve</text>
      <text x="421" y="66" text-anchor="middle" class="metricSmall">Vector + BM25</text>
      <text x="421" y="96" text-anchor="middle" class="small">RRF fusion · top-k 5</text>
      <path class="line" d="M 554 63 H 594"/>

      <rect x="602" y="0" width="250" height="126" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="727" y="34" text-anchor="middle" class="label">Grade</text>
      <text x="727" y="66" text-anchor="middle" class="metricSmall">Answerable?</text>
      <text x="727" y="96" text-anchor="middle" class="small">LLM · cosine fallback</text>
      <text x="880" y="48" text-anchor="middle" class="smallDark" style="fill:#6ee7b7">yes</text>
      <path class="line" d="M 860 63 H 900"/>

      <rect x="908" y="0" width="250" height="126" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="1033" y="34" text-anchor="middle" class="label">Generate</text>
      <text x="1033" y="66" text-anchor="middle" class="metricSmall">Provider seam</text>
      <text x="1033" y="96" text-anchor="middle" class="small">Nebius — mandatory call</text>
      <path class="line" d="M 1166 63 H 1206"/>

      <rect x="1214" y="0" width="340" height="126" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
      <rect x="1214" y="0" width="8" height="126" fill="#059669"/>
      <text x="1392" y="34" text-anchor="middle" class="label" style="fill:#047857">Cited answer</text>
      <text x="1392" y="66" text-anchor="middle" class="metricSmall">Sources + snippets</text>
      <text x="1392" y="96" text-anchor="middle" class="small">confidence · copy/retry · feedback</text>

      <path class="branch" d="M 727 134 V 217 H 1202"/>
      <text x="752" y="206" class="smallDark" style="fill:#fda4af">no — below threshold</text>

      <rect x="1214" y="168" width="340" height="98" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
      <rect x="1214" y="168" width="8" height="98" fill="#be123c"/>
      <text x="1392" y="202" text-anchor="middle" class="label" style="fill:#be123c">Honest refusal</text>
      <text x="1392" y="234" text-anchor="middle" class="small" font-style="italic">"I could not find this in the course materials."</text>
    </g>
    <text x="42" y="445" class="bodyDark">Invariant: chunks carry citation spans from ingest, so every answer can point at its evidence.</text>
  </g>

  <!-- ============ Chapter 2: corpus ============ -->
  <g class="font" transform="translate(70 760)">
    <rect class="card" width="810" height="545" rx="24"/>
    <circle cx="46" cy="54" r="23" fill="#e5e7eb" stroke="#94a3b8"/>
    <text x="46" y="61" text-anchor="middle" class="num">2</text>
    <text x="88" y="46" class="q">What feeds it?</text>
    <text x="88" y="88" class="headline">Two tiers keep the scores honest</text>

    <rect x="40" y="120" width="350" height="232" rx="14" class="plain"/>
    <text x="62" y="154" class="label">Frozen eval corpus</text>
    <text x="62" y="192" class="body">awesome-agentic-ai-resources</text>
    <text x="62" y="224" class="body">Mastering-Agentic-AI-Week1</text>
    <text x="62" y="266" class="small">Commit-pinned · 4 docs → 53 chunks</text>
    <text x="62" y="294" class="small">Scored by a 15-question gold set</text>
    <text x="62" y="322" class="small">Never written to by the app</text>

    <rect x="420" y="120" width="350" height="232" rx="14" class="plain"/>
    <text x="442" y="154" class="label">Production serving corpus</text>
    <text x="442" y="192" class="body">Pinned GitHub seed at boot</text>
    <text x="442" y="224" class="body">+ admin uploads (PDF wired)</text>
    <text x="442" y="266" class="small">DOCX / PPTX loaders are future</text>
    <text x="442" y="294" class="small">/data stays gitignored</text>
    <text x="442" y="322" class="small">Orphaned vectors filtered at boot</text>

    <path class="blocked" d="M 560 392 H 270"/>
    <circle cx="412" cy="392" r="15" fill="#ffffff" stroke="#be123c" stroke-width="3"/>
    <path d="M 402 382 L 422 402" stroke="#be123c" stroke-width="3"/>
    <text x="412" y="430" text-anchor="middle" class="small" style="fill:#be123c">Uploads never mutate the eval collection</text>

    <text x="40" y="478" class="body">Admins invite members, upload, delete, and re-index.</text>
    <text x="40" y="508" class="small">Dashboard: usage, refusal rate, latency, thumbs feedback.</text>
  </g>

  <!-- ============ Chapter 3: eval ============ -->
  <g class="font" transform="translate(920 760)">
    <rect class="card" width="810" height="545" rx="24"/>
    <circle cx="46" cy="54" r="23" fill="#e5e7eb" stroke="#94a3b8"/>
    <text x="46" y="61" text-anchor="middle" class="num">3</text>
    <text x="88" y="46" class="q">How do we know it works?</text>
    <text x="88" y="88" class="headline">Eval is the release gate</text>

    <g transform="translate(40 120)">
      <rect class="plain" width="130" height="88" rx="12"/>
      <text x="65" y="38" text-anchor="middle" class="metric">0.67</text>
      <text x="65" y="66" text-anchor="middle" class="small">recall@k</text>
      <rect class="plain" x="146" width="130" height="88" rx="12"/>
      <text x="211" y="38" text-anchor="middle" class="metric">0.22</text>
      <text x="211" y="66" text-anchor="middle" class="small">precision@k</text>
      <rect class="plain" x="292" width="130" height="88" rx="12"/>
      <text x="357" y="38" text-anchor="middle" class="metric">0.55</text>
      <text x="357" y="66" text-anchor="middle" class="small">MRR</text>
      <rect class="plain" x="438" width="130" height="88" rx="12"/>
      <text x="503" y="38" text-anchor="middle" class="metric">0.73</text>
      <text x="503" y="66" text-anchor="middle" class="small">refusal corr.</text>
      <rect class="plain" x="584" width="130" height="88" rx="12"/>
      <text x="649" y="38" text-anchor="middle" class="metric">58%</text>
      <text x="649" y="66" text-anchor="middle" class="small">faithful</text>
    </g>
    <text x="40" y="246" class="body">15 gold questions: 12 retrieval-scored + 3 unanswerable.</text>
    <text x="40" y="274" class="small">Deterministic metrics; the LLM judge scores only faithfulness.</text>
    <path d="M 40 300 H 770" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 8"/>

    <text x="40" y="334" class="label">Experiments — measured, then decided</text>
    <text x="40" y="372" class="bodyStrong">Rerank — quality up, latency 3×</text>
    <rect x="630" y="350" width="140" height="32" rx="16" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="700" y="371" text-anchor="middle" class="pill">default-off</text>
    <text x="40" y="400" class="small">recall 0.67→0.79 <tspan class="up">▲</tspan> · precision 0.22→0.25 <tspan class="up">▲</tspan> · MRR 0.55→0.58 <tspan class="up">▲</tspan></text>
    <text x="40" y="426" class="small">but p95 latency 286→886 ms <tspan class="down">▲</tspan> — and not baked into the Space image</text>

    <text x="40" y="468" class="bodyStrong">Section-aware chunking — regressed</text>
    <rect x="630" y="446" width="140" height="32" rx="16" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="700" y="467" text-anchor="middle" class="pill">default-off</text>
    <text x="40" y="496" class="small">recall 0.67→0.64 <tspan class="down">▼</tspan> · precision 0.22→0.18 <tspan class="down">▼</tspan> · MRR 0.55→0.34 <tspan class="down">▼</tspan></text>

    <text x="40" y="528" class="small">Both stay implemented and reversible; eval wins must justify their cost.</text>
  </g>

  <!-- ============ Chapter 4: seams + deploy ============ -->
  <g class="font" transform="translate(70 1355)">
    <rect class="card" width="1660" height="450" rx="24"/>
    <circle cx="46" cy="54" r="23" fill="#e5e7eb" stroke="#94a3b8"/>
    <text x="46" y="61" text-anchor="middle" class="num">4</text>
    <text x="88" y="46" class="q">Where does it run?</text>
    <text x="88" y="88" class="headline">One Docker image, every axis behind a seam</text>

    <rect x="40" y="120" width="800" height="290" rx="14" class="lane"/>
    <text x="64" y="154" class="label">Config seams</text>
    <text x="220" y="154" class="label" style="fill:#047857">In use</text>
    <text x="510" y="154" class="label">Preset / swap</text>

    <text x="64" y="204" class="label">Embeddings</text>
    <circle cx="208" cy="199" r="5" fill="#059669"/>
    <text x="220" y="204" class="body">local MiniLM · 384-dim</text>
    <circle cx="498" cy="199" r="5" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <text x="510" y="204" class="small">Nebius — requires fresh ingest</text>

    <text x="64" y="256" class="label">Vector store</text>
    <circle cx="208" cy="251" r="5" fill="#059669"/>
    <text x="220" y="256" class="body">Pinecone (serving)</text>
    <circle cx="498" cy="251" r="5" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <text x="510" y="256" class="small">Chroma — local dev; eval stays local</text>

    <text x="64" y="308" class="label">Datastore</text>
    <circle cx="208" cy="303" r="5" fill="#059669"/>
    <text x="220" y="308" class="body">SQLite</text>
    <circle cx="498" cy="303" r="5" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <text x="510" y="308" class="small">Postgres — future scale trigger</text>

    <text x="64" y="360" class="label">Generation</text>
    <circle cx="208" cy="355" r="5" fill="#059669"/>
    <text x="220" y="360" class="body">Nebius — the mandatory call</text>
    <circle cx="498" cy="355" r="5" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <text x="510" y="360" class="small">OpenRouter / OpenAI — proven swap</text>

    <rect x="880" y="120" width="740" height="290" rx="14" class="plain"/>
    <text x="904" y="154" class="label">Deploy — Hugging Face Space</text>
    <text x="904" y="196" class="body">Same Docker image locally and on the Space.</text>
    <text x="904" y="230" class="body">First boot seeds the pinned eval corpus.</text>
    <text x="904" y="264" class="body">HTTP smoke verifies boot + login render.</text>
    <text x="904" y="298" class="body">Pinecone serving vectors persist outside /data.</text>
    <rect x="904" y="320" width="692" height="62" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="926" y="358" font-size="14" font-weight="700" fill="#92400e">⚠ /data (users, uploads, logs) is wiped without paid persistent storage.</text>
  </g>

  <!-- ============ Chapter 5: guardrails ============ -->
  <g class="font" transform="translate(70 1855)">
    <rect class="dark" width="1660" height="225" rx="26"/>
    <circle cx="46" cy="54" r="23" fill="#334155" stroke="#64748b"/>
    <text x="46" y="61" text-anchor="middle" class="numDark">5</text>
    <text x="88" y="46" class="qDark">What keeps it honest?</text>
    <text x="88" y="88" class="headlineDark">Guardrails over infrastructure</text>

    <g transform="translate(42 118)">
      <rect width="116" height="40" rx="20" fill="none" stroke="#64748b" stroke-width="1.5"/>
      <text x="58" y="25" text-anchor="middle" class="chipDark">eval first</text>
      <rect x="134" width="166" height="40" rx="20" fill="none" stroke="#64748b" stroke-width="1.5"/>
      <text x="217" y="25" text-anchor="middle" class="chipDark">hard refusal path</text>
      <rect x="318" width="180" height="40" rx="20" fill="none" stroke="#64748b" stroke-width="1.5"/>
      <text x="408" y="25" text-anchor="middle" class="chipDark">citations at ingest</text>
      <rect x="516" width="176" height="40" rx="20" fill="none" stroke="#64748b" stroke-width="1.5"/>
      <text x="604" y="25" text-anchor="middle" class="chipDark">no sample solution</text>
      <rect x="710" width="198" height="40" rx="20" fill="none" stroke="#64748b" stroke-width="1.5"/>
      <text x="809" y="25" text-anchor="middle" class="chipDark">seams before services</text>
      <rect x="926" width="176" height="40" rx="20" fill="none" stroke="#64748b" stroke-width="1.5"/>
      <text x="1014" y="25" text-anchor="middle" class="chipDark">no premature infra</text>
    </g>
    <text x="42" y="196" class="smallDark">Scale posture: ~200 learners per two-month cohort — measured failures, not imagined scale, justify new infrastructure.</text>
  </g>

  <g class="font">
    <text x="72" y="2120" class="small">Companion visual for the write-up and demo. Architecture detail: diagrams 01–04.</text>
  </g>
</svg>
